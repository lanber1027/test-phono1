<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Phone App</title>
  <link rel="stylesheet" href="./style.css?v=2" />
</head>
<body>
  <div class="page-bg">
    <div id="phone-screen">

      <div id="status-bar">
        <span>9:41</span>
        <span>📶  WiFi  🔋</span>
      </div>

      <div id="home-screen" class="screen active">
        <div id="clock-container">
          <div class="time">9:41</div>
          <div class="date">Monday, April 7</div>
        </div>

        <div class="app-grid">
          <div class="app-icon" onclick="showScreen('studio-screen')">
            <div class="icon-bg">🎭</div>
            <div class="label">小剧场</div>
          </div>

          <div class="app-icon" onclick="showScreen('date-screen')">
            <div class="icon-bg">💕</div>
            <div class="label">约会</div>
          </div>

          <div class="app-icon" onclick="showScreen('profile-screen')">
            <div class="icon-bg">👤</div>
            <div class="label">我的</div>
          </div>
        </div>
      </div>

<div id="studio-screen" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('home-screen')">←</button>
    <div class="header-title">小剧场</div>
    <div class="header-right"></div>
  </div>

  <div class="studio-chat-layout">
    <div id="studio-messages" class="studio-messages">
      <div class="studio-message ai">
        <div class="bubble">
          这里是小剧场。请输入一个场景，我会把它展开成对话。
        </div>
      </div>
    </div>

    <div class="studio-input-area">
      <textarea
        id="studio-input"
        placeholder="例如：深夜便利店重逢，两个人表面平静，其实都还没放下。"
      ></textarea>
      <button class="main-btn" onclick="generateStudio()">发送</button>
    </div>
  </div>
</div>

  </div>
</div>

      <div id="date-screen" class="screen">
        <div class="header">
          <button class="back-btn" onclick="showScreen('home-screen')">←</button>
          <div class="header-title">约会</div>
          <div class="header-right"></div>
        </div>

        <div class="content">
          <h2>约会</h2>
          <p>这里以后可以做约会场景、AI 推荐、互动页面。</p>
          <button class="main-btn">生成约会想法</button>
        </div>
      </div>

      <div id="profile-screen" class="screen">
        <div class="header">
          <button class="back-btn" onclick="showScreen('home-screen')">←</button>
          <div class="header-title">我的</div>
          <div class="header-right"></div>
        </div>

        <div class="content">
          <h2>个人页</h2>
          <p>这里以后可以放设置、头像、主题、资料。</p>
        </div>
      </div>

    </div>
  </div>

<script>
  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(screen => {
      screen.classList.remove('active');
    });

    const target = document.getElementById(screenId);
    if (target) {
      target.classList.add('active');
    }
  }

  function appendStudioMessage(role, text) {
    const messages = document.getElementById('studio-messages');
    const message = document.createElement('div');
    message.className = `studio-message ${role}`;
    message.innerHTML = `<div class="bubble">${text}</div>`;
    messages.appendChild(message);
    messages.scrollTop = messages.scrollHeight;
  }

  function generateStudio() {
    const inputEl = document.getElementById('studio-input');
    const input = inputEl.value.trim();

    if (!input) return;

    appendStudioMessage('user', input);

    const replies = [
      `【场景展开】夜色很安静，${input}。气氛克制，却又带着一点没说出口的情绪。`,
      `A：好久不见。<br>B：……嗯，好久了。`,
      `A：我还以为你不会再来这里。<br>B：我也以为你不会。`,
      `空气短暂安静下来，像是谁都没有真正准备好面对这次重逢。`
    ];

    let index = 0;

    function sendNextReply() {
      if (index < replies.length) {
        appendStudioMessage('ai', replies[index]);
        index++;
        setTimeout(sendNextReply, 700);
      }
    }

    setTimeout(sendNextReply, 400);
    inputEl.value = '';
  }
</script>
</body>
</html>
